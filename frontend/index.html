<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Blog App</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #6a8cff, #7a4bff);
    color: white;
    text-align: center;
}

/* Heading */
h1 {
    margin-top: 60px;
    font-size: 2.5rem;
}

/* Dark Mode Button */
.toggle-btn {
    margin-top: 15px;
    padding: 10px 18px;
    border-radius: 12px;
    border: none;
    background: #eee;
    cursor: pointer;
    font-weight: 500;
}

/* Input Section */
.input-group {
    margin-top: 25px;
}

.input-group input {
    padding: 12px;
    margin: 8px;
    border-radius: 12px;
    border: none;
    width: 220px;
    outline: none;
}

.input-group button {
    padding: 12px 18px;
    border-radius: 12px;
    border: none;
    background: #eee;
    cursor: pointer;
}

/* Search */
#search {
    margin-top: 15px;
    padding: 12px;
    border-radius: 12px;
    border: none;
    width: 260px;
    outline: none;
}

/* Blog Card */
.blog {
    background: #f1f1f1;
    color: black;
    width: 55%;
    margin: 60px auto;
    padding: 35px;
    border-radius: 20px;
}

/* Buttons */
.blog button {
    margin: 5px;
    padding: 8px 14px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

/* Dark Mode */
.dark {
    background: #121212;
}

.dark .blog {
    background: #2c2c2c;
    color: white;
}
</style>
</head>

<body>

<h1>🎥 My Blog App</h1>

<button class="toggle-btn" onclick="toggleDark()">🌙 Dark Mode</button>

<div class="input-group">
    <input type="text" id="title" placeholder="Enter title">
    <input type="text" id="content" placeholder="Enter content">
    <button onclick="addBlog()">Add Blog</button>
</div>

<input id="search" placeholder="Search..." onkeyup="searchBlog()">

<div id="blogsContainer"></div>

<script src="script.js"></script>

<script>
// Dark Mode
function toggleDark() {
    document.body.classList.toggle("dark");
}

// Search
function searchBlog() {
    const value = document.getElementById("search").value.toLowerCase();
    const blogs = document.querySelectorAll(".blog");

    blogs.forEach(blog => {
        blog.style.display = blog.innerText.toLowerCase().includes(value)
            ? "block"
            : "none";
    });
}
</script>

</body>
</html>
